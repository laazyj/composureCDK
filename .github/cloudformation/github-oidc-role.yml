AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC federation for ComposureCDK deploy-test pipeline.
  Deploy this stack once in your sandbox account before running the workflow.
  IAM resources (role, managed policy, OIDC provider) are global, so a single
  deployment covers every region the workflow operates in.

  Usage:
    aws cloudformation deploy \
      --template-file github-oidc-role.yml \
      --stack-name github-actions-oidc \
      --parameter-overrides GitHubOrg=laazyj RepoName=composureCDK \
      --capabilities CAPABILITY_NAMED_IAM
    aws cloudformation update-termination-protection \
      --stack-name github-actions-oidc \
      --enable-termination-protection

Parameters:
  GitHubOrg:
    Type: String
    Default: laazyj
    Description: GitHub organisation or username that owns the repository.

  RepoName:
    Type: String
    Default: composureCDK
    Description: GitHub repository name.

  OIDCProviderArn:
    Type: String
    Default: ""
    Description: >
      ARN of an existing GitHub OIDC provider in this account.
      Leave blank to create one. Only one provider per account is allowed,
      so if another stack already created it, paste its ARN here.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, ""]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub's OIDC thumbprint — AWS validates the provider certificate
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployTestRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-composurecdk-deploy
      Description: Assumed by GitHub Actions to deploy ComposureCDK examples
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${RepoName}:environment:sandbox

  # Managed policy rather than inline — avoids IAM_NO_INLINE_POLICY_CHECK
  # and makes the role easier to audit independently of the stack.
  #
  # All example stacks use the "ComposureCDK-" prefix convention.
  # CloudFormation auto-tags every resource with aws:cloudformation:stack-name,
  # so tag conditions using "ComposureCDK-*" limit access to resources belonging
  # to example stacks without needing to enumerate each stack by name.
  # New examples automatically get coverage as long as they follow the prefix.
  # Region segments in resource ARNs use `*`: the security boundary is the
  # tag-condition / stack-name pattern, not the region. See docs/ci.md.
  DeployTestPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: github-actions-composurecdk-deploy
      Description: Permissions for ComposureCDK deploy-test pipeline
      Roles:
        - !Ref DeployTestRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # CDK bootstrap resources — read/write assets to the CDK staging bucket
          - Sid: CDKBootstrapBucket
            Effect: Allow
            Action:
              - s3:GetObject*
              - s3:GetBucket*
              - s3:List*
              - s3:DeleteObject*
              - s3:PutObject*
              - s3:GetEncryptionConfiguration
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::cdk-*
          - Sid: CDKBootstrapSSM
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource:
              - !Sub arn:${AWS::Partition}:ssm:*:${AWS::AccountId}:parameter/cdk-bootstrap/*

          # CloudFormation — mutating actions scoped to ComposureCDK- stacks.
          # Resource ARNs are string patterns evaluated at request time;
          # the stacks do not need to exist when this template is deployed.
          - Sid: CloudFormation
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:GetTemplate
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:GetTemplateSummary
              - cloudformation:ListStackResources
            Resource:
              - !Sub arn:${AWS::Partition}:cloudformation:*:${AWS::AccountId}:stack/ComposureCDK-*
          # ListStacks is read-only (names and statuses only) and cannot
          # be scoped to specific stacks. Needed by the smoke test to
          # discover ComposureCDK-* stacks.
          - Sid: CloudFormationList
            Effect: Allow
            Action:
              - cloudformation:ListStacks
            Resource: "*"

          # EC2 — read-only describes for the smoke test against
          # ComposureCDK-Ec2Stack: instance state + status, and the live
          # security-group rules (bastion + database tiers). EC2 Describe*
          # actions do not support resource-level permissions, so Resource
          # is "*". Stack creation/mutation of EC2 resources runs under the
          # CDK cfn-exec role (not this OIDC role) via AssumeRole below.
          - Sid: EC2Read
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeSecurityGroups
            Resource: "*"

          # Neptune — read-only describe for the smoke test against
          # ComposureCDK-NeptuneGraphStack. Neptune's control plane shares the
          # RDS API namespace, so describing the cluster is an `rds:` action.
          # RDS Describe* actions do not support resource-level permissions, so
          # Resource is "*" (same constraint as EC2Read above). Cluster
          # creation/mutation runs under the CDK cfn-exec role (not this OIDC
          # role) via AssumeRole below.
          - Sid: NeptuneRead
            Effect: Allow
            Action:
              - rds:DescribeDBClusters
            Resource: "*"

          # SSM Run Command — the Neptune smoke test SSMs to the bastion and
          # runs a SigV4-signed OpenCypher health query against the cluster.
          # SendCommand is granted across two resource scopes: the AWS-managed
          # `AWS-RunShellScript` document (public, carries no tag) and the
          # target instances, restricted to ComposureCDK-* stacks via the
          # CloudFormation stack-name tag on the bastion. GetCommandInvocation
          # does not support resource-level permissions, so it is granted on
          # "*" (read-only command status).
          - Sid: SSMSendCommandDocument
            Effect: Allow
            Action:
              - ssm:SendCommand
            Resource:
              - !Sub arn:${AWS::Partition}:ssm:*::document/AWS-RunShellScript
          - Sid: SSMSendCommandInstances
            Effect: Allow
            Action:
              - ssm:SendCommand
            Resource:
              - !Sub arn:${AWS::Partition}:ec2:*:${AWS::AccountId}:instance/*
            Condition:
              StringLike:
                ssm:resourceTag/aws:cloudformation:stack-name: ComposureCDK-*
          - Sid: SSMCommandStatus
            Effect: Allow
            Action:
              - ssm:GetCommandInvocation
            Resource: "*"

          # Lambda — scoped by CloudFormation stack-name tag.
          # CreateFunction accepts Tags, so aws:RequestTag works at
          # creation time. Mutations use aws:ResourceTag on the
          # already-tagged resource.
          - Sid: LambdaCreate
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:TagResource
            Resource:
              - !Sub arn:${AWS::Partition}:lambda:*:${AWS::AccountId}:function:*
            Condition:
              StringLike:
                aws:RequestTag/aws:cloudformation:stack-name: ComposureCDK-*
          - Sid: LambdaMutate
            Effect: Allow
            Action:
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:UntagResource
              - lambda:ListTags
              # Smoke test invokes example functions for verification
              - lambda:InvokeFunction
            Resource:
              - !Sub arn:${AWS::Partition}:lambda:*:${AWS::AccountId}:function:*
            Condition:
              StringLike:
                aws:ResourceTag/aws:cloudformation:stack-name: ComposureCDK-*

          # API Gateway — tag-based conditions are not consistently
          # supported across all API Gateway actions, so we rely on
          # ARN-scoped resources here.
          - Sid: APIGateway
            Effect: Allow
            Action:
              - apigateway:GET
              - apigateway:POST
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
            Resource:
              - !Sub arn:${AWS::Partition}:apigateway:*::/restapis*
              - !Sub arn:${AWS::Partition}:apigateway:*::/tags*

          # CloudWatch Logs — scoped by CloudFormation stack-name tag.
          - Sid: LogsCreate
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:TagResource
              - logs:TagLogGroup
            Resource:
              - !Sub arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:*
            Condition:
              StringLike:
                aws:RequestTag/aws:cloudformation:stack-name: ComposureCDK-*
          - Sid: LogsMutate
            Effect: Allow
            Action:
              - logs:DeleteLogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - logs:DeleteRetentionPolicy
              - logs:UntagLogGroup
              - logs:UntagResource
              - logs:ListTagsForResource
              - logs:ListTagsLogGroup
              # Smoke test reads example log groups for verification
              - logs:FilterLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:*
            Condition:
              StringLike:
                aws:ResourceTag/aws:cloudformation:stack-name: ComposureCDK-*

          # IAM — CDK creates execution roles for Lambda.
          # CreateRole needs aws:RequestTag because the role has no
          # tags at creation time.
          - Sid: IAMCreateRole
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:TagRole
            Resource:
              - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*
            Condition:
              StringLike:
                aws:RequestTag/aws:cloudformation:stack-name: ComposureCDK-*
          - Sid: IAMMutateRoles
            Effect: Allow
            Action:
              - iam:DeleteRole
              - iam:GetRole
              - iam:PassRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:UntagRole
            Resource:
              - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*
            Condition:
              StringLike:
                aws:ResourceTag/aws:cloudformation:stack-name: ComposureCDK-*

          # SQS — smoke test publishes a message to the orders queue to
          # verify the consumer Lambda. CloudFormation's aws:cloudformation:*
          # system tags do not propagate to SQS queues in a form IAM can
          # evaluate via aws:ResourceTag (unlike Lambda/Logs/IAM), so this
          # uses an ARN scope. The role is already restricted to the
          # `sandbox` environment by the OIDC trust policy above, so the
          # blast radius is the sandbox account's queues only.
          - Sid: SQSSendMessage
            Effect: Allow
            Action:
              - sqs:SendMessage
            Resource:
              - !Sub arn:${AWS::Partition}:sqs:*:${AWS::AccountId}:*

          # CDK bootstrap roles — assumed by CDK CLI for asset publishing
          # and CloudFormation execution
          - Sid: CDKAssetRoles
            Effect: Allow
            Action:
              - iam:PassRole
              - iam:GetRole
            Resource:
              - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/cdk-*
          - Sid: STS
            Effect: Allow
            Action:
              - sts:AssumeRole
            Resource:
              - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/cdk-*

Outputs:
  RoleArn:
    Description: ARN to use in the GitHub Actions workflow
    Value: !GetAtt DeployTestRole.Arn

  OIDCProviderArn:
    Description: Pass this to other stacks via OIDCProviderArn parameter to avoid duplicates
    Condition: CreateOIDCProvider
    Value: !Ref GitHubOIDCProvider
