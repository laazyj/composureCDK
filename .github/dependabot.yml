version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk"
          - "aws-cdk*"
          - "@aws-cdk/*"
      nx:
        patterns:
          - "nx"
          - "@nx/*"
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "aws-cdk"
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "nx"
          - "@nx/*"
