name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Format, Typecheck, Test, Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is the supported floor; 24 is current LTS; 26 is next.
        # Dual-published packages must resolve on all — see ADR-0007.
        node-version: [20, 22, 24, 26]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Pin npm across the whole matrix. Node 20/22 ship npm 10 while 24/26 ship
      # npm 11, and the two disagree on how optional peer deps are pinned in the
      # lockfile (npm 11 prunes entries like vitest's optional `yaml` peer that
      # npm 10 still expects). Our lockfile is generated under npm 11 (release
      # tooling runs on Node 24), so `npm ci` on the npm 10 legs would otherwise
      # fail with "Missing: yaml@2.9.0 from lock file". Install under one npm.
      - name: Pin npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check exports
        run: npm run check:exports

      - name: Lint
        run: npm run lint

      # Cheap gate: each package's peerDependencies.aws-cdk-lib must match the
      # cdk-floors.json manifest (ADR-0008).
      - name: Check CDK floor ranges in sync
        run: npm run cdk-floors:check

      - name: Test
        run: npm run test

  # Self-contained coverage reporting (no external service): run the suite once
  # on a single Node version, merge every package's json-summary output into one
  # markdown table (scripts/coverage-summary.mjs) and publish it to the Actions
  # run summary. The per-file thresholds in each vitest.config.ts already gate
  # coverage during `npm run test`; this job only surfaces the numbers to
  # reviewers. See docs/ci.md#coverage-reporting.
  #
  # The sticky PR comment is posted by coverage-comment.yml, not here: this
  # workflow is workflow_call-able from release.yml, and a job requesting
  # `pull-requests: write` fails validation under that caller's narrower
  # permission ceiling — even when the posting step could never run.
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NX_DAEMON: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # nx test depends on ^build + typecheck, so the graph builds what it needs.
      # Coverage (v8, json-summary reporter) is always on via vitest.config.base.
      - name: Test with coverage
        run: npm run test

      # if: always() — a threshold miss fails the step above but reviewers still
      # want the table showing which package dipped.
      - name: Build coverage summary
        if: always()
        run: npm run coverage:summary

      # The workflow_run listener has no access to this run's PR context, so the
      # number travels with the artifact.
      - name: Record PR number
        if: always() && github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p coverage
          printf '%s' "$PR_NUMBER" > coverage/pr-number.txt

      - name: Upload coverage summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-summary
          path: |
            coverage/coverage-summary.md
            coverage/pr-number.txt
          if-no-files-found: error
          retention-days: 1

  # Derive the distinct floors from cdk-floors.json so the enforce matrix
  # stays in sync without duplicating values in YAML.
  cdk-floors-list:
    name: List CDK floors
    runs-on: ubuntu-latest
    outputs:
      floors: ${{ steps.read.outputs.floors }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Read distinct floors from manifest
        id: read
        run: |
          node -e '
            const m = JSON.parse(require("node:fs").readFileSync("cdk-floors.json", "utf8")).floors;
            const rows = Object.entries(m)
              .sort((a, b) => a[0].localeCompare(b[0]))
              .map(([pkg, e]) => `  ${pkg.padEnd(16)} ${e.floor}  (${e.gatedBy})`)
              .join("\n");
            const floors = [...new Set(Object.values(m).map((e) => e.floor))];
            console.log("Per-package aws-cdk-lib floors (cdk-floors.json):\n" + rows);
            console.log("\nDistinct floors -> enforce matrix shards: " + JSON.stringify(floors));
            require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, "floors=" + JSON.stringify(floors) + "\n");
          '

  # For each declared floor, pin aws-cdk-lib to it (npm overrides, clean install)
  # and run that floor's package group's unit suite against it. The suites
  # synthesise builders + policies via partial-matcher assertions, so this
  # catches both import-time (missing named export) and runtime (calling a
  # too-new method, e.g. the #146 Aspect call) version-gated APIs. One floor per
  # shard; the shard's fresh checkout is the clean tree the override needs.
  cdk-floors-enforce:
    name: Enforce aws-cdk-lib@${{ matrix.floor }}
    needs: cdk-floors-list
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NX_DAEMON: false
      CDK_FLOORS_FLOOR: ${{ matrix.floor }}
    strategy:
      fail-fast: false
      matrix:
        floor: ${{ fromJSON(needs.cdk-floors-list.outputs.floors) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      # No `npm ci` — enforce does the floor-pinned install itself, and the
      # fresh checkout is the clean tree the npm override requires.
      - name: Enforce
        run: npm run cdk-floors:enforce
