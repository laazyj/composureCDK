name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Format, Typecheck, Test, Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is the supported floor; 24 is current. Dual-published
        # packages must resolve on both — see ADR-0007.
        node-version: [20, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check exports
        run: npm run check:exports

      - name: Lint
        run: npm run lint

      # Cheap gate: each package's peerDependencies.aws-cdk-lib must match the
      # cdk-floors.json manifest (ADR-0008).
      - name: Check CDK floor ranges in sync
        run: npm run cdk-floors:check

      - name: Test
        run: npm run test

  cdk-floors-enforce:
    # Real-install per-package floor guard: packs the @composurecdk graph,
    # installs each package at its own declared aws-cdk-lib floor, and asserts
    # every package imports. The runtime complement to `cdk-floors:check` —
    # see ADR-0008. Kept as a separate job because it does network installs
    # per floor (~7 today) and has different failure-mode logs.
    name: CDK floors enforce
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Packs from each package's dist, so the build must run first.
      - name: Build
        run: npm run build

      - name: Enforce per-package floors
        run: npm run cdk-floors:enforce
