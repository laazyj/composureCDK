name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Format, Typecheck, Test, Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is the supported floor; 24 is current. Dual-published
        # packages must resolve on both — see ADR-0007.
        node-version: [20, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check exports
        run: npm run check:exports

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  cdk-floor:
    name: CDK floor compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Packs from each package's dist, so the build must run first.
      - name: Build
        run: npm run build

      # Installs a real, pinned aws-cdk-lib floor and synthesises against it,
      # catching published packages that reach for a too-new CDK API (#146).
      - name: Synth against the aws-cdk-lib floor
        run: npm run test:cdk-floor
