name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for deployment test
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
  workflow_call:
    inputs:
      environment:
        description: Target environment for deployment test
        required: false
        default: sandbox
        type: string

permissions:
  contents: read
  id-token: write # Required for AWS OIDC

concurrency:
  # Shared with sandbox-cleanup.yml so a teardown can never run against the
  # sandbox account while a deploy is in flight (and vice versa). Keep this
  # group string identical in both workflows.
  group: sandbox-account-${{ inputs.environment || 'sandbox' }}
  cancel-in-progress: false # Never cancel in-flight deployments

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-test:
    name: Deploy and Verify Examples
    needs: ci
    runs-on: ubuntu-latest
    # Neptune DB instance provisioning alone is a >15 min long pole; 30 min
    # left too little slack for a clean deploy of the full example fleet.
    timeout-minutes: 45
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NX_DAEMON: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check for in-progress ComposureCDK stacks
        env:
          # Sandbox primary plus every region any example pins via
          # stack `env.region`. Keep in sync with SWEEP_REGIONS in
          # sandbox-cleanup.yml.
          CHECK_REGIONS: ${{ vars.AWS_REGION }} us-east-1
        run: |
          fail=0
          for region in $CHECK_REGIONS; do
            in_progress=$(aws cloudformation list-stacks --region "$region" \
              --stack-status-filter CREATE_IN_PROGRESS UPDATE_IN_PROGRESS DELETE_IN_PROGRESS UPDATE_ROLLBACK_IN_PROGRESS ROLLBACK_IN_PROGRESS REVIEW_IN_PROGRESS \
              --query "StackSummaries[?starts_with(StackName, 'ComposureCDK-')].StackName" \
              --output text)
            if [ -n "$in_progress" ]; then
              echo "::error::CloudFormation operations in progress in $region on ComposureCDK-* stacks: $in_progress"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "Wait for sandbox-cleanup to complete or trigger it manually before retrying."
            exit 1
          fi

      - name: CDK Deploy
        working-directory: packages/examples
        run: npx cdk deploy --all --require-approval never --concurrency 5

      - name: Smoke Test
        working-directory: packages/examples
        run: node ../../scripts/smoke-test.mjs

      # Destroy runs in a separate sandbox-cleanup workflow (triggered by
      # workflow_run on this workflow plus a nightly cron safety net). Keeping
      # destroy off the critical path lets developer feedback land in ~10 min
      # instead of waiting for CloudFront propagation during teardown.
