name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for deployment test
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
  workflow_call:
    inputs:
      environment:
        description: Target environment for deployment test
        required: false
        default: sandbox
        type: string

permissions:
  contents: read
  id-token: write # Required for AWS OIDC

concurrency:
  group: deploy-test-${{ github.event.inputs.environment }}
  cancel-in-progress: false # Never cancel in-flight deployments

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-test:
    name: Deploy and Verify Examples
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NX_DAEMON: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK Deploy
        working-directory: packages/examples
        run: npx cdk deploy --all --require-approval never

      - name: Smoke Test
        working-directory: packages/examples
        run: node ../../scripts/smoke-test.mjs

      - name: CDK Destroy
        if: always()
        working-directory: packages/examples
        run: |
          # Only destroy if AWS credentials were configured
          if ! aws sts get-caller-identity > /dev/null 2>&1; then
            echo "Skipping destroy — no AWS credentials available"
            exit 0
          fi

          # Attempt destroy up to 3 times. A single stack failure (e.g.
          # non-empty S3 bucket) causes CDK to abort before reaching the
          # remaining stacks. Retrying gives CloudFormation a chance to
          # finish async cleanup and proceed with the rest.
          for attempt in 1 2 3; do
            echo "=== Destroy attempt $attempt ==="
            if npx cdk destroy --all --force 2>&1; then
              echo "All stacks destroyed successfully."
              exit 0
            fi
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done

          echo "::warning::Some stacks could not be destroyed after 3 attempts. Check the AWS console for orphaned ComposureCDK-* stacks."
          exit 1
