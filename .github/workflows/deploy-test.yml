name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for deployment test
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
  workflow_call:
    inputs:
      environment:
        description: Target environment for deployment test
        required: false
        default: sandbox
        type: string

permissions:
  contents: read
  id-token: write # Required for AWS OIDC

concurrency:
  group: deploy-test-${{ github.event.inputs.environment }}
  cancel-in-progress: false # Never cancel in-flight deployments

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-test:
    name: Deploy and Verify Examples
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NX_DAEMON: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check for in-progress ComposureCDK stacks
        run: |
          in_progress=$(aws cloudformation list-stacks \
            --stack-status-filter CREATE_IN_PROGRESS UPDATE_IN_PROGRESS DELETE_IN_PROGRESS UPDATE_ROLLBACK_IN_PROGRESS ROLLBACK_IN_PROGRESS REVIEW_IN_PROGRESS \
            --query "StackSummaries[?starts_with(StackName, 'ComposureCDK-')].StackName" \
            --output text)
          if [ -n "$in_progress" ]; then
            echo "::error::CloudFormation operations in progress on ComposureCDK-* stacks: $in_progress"
            echo "Wait for sandbox-cleanup to complete or trigger it manually before retrying."
            exit 1
          fi

      - name: CDK Deploy
        working-directory: packages/examples
        run: npx cdk deploy --all --require-approval never --concurrency 5

      - name: Smoke Test
        working-directory: packages/examples
        run: node ../../scripts/smoke-test.mjs

      # Destroy runs in a separate sandbox-cleanup workflow (triggered by
      # workflow_run on this workflow plus a nightly cron safety net). Keeping
      # destroy off the critical path lets developer feedback land in ~10 min
      # instead of waiting for CloudFront propagation during teardown.
