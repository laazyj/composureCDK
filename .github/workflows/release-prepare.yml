name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      specifier:
        description: "Explicit version (e.g. 0.2.0). Leave blank for conventional-commits auto-detect."
        required: false
        type: string
      bump-peer-deps:
        description: "Rewrite @composurecdk/* peer-dep ranges before versioning. Required for 0.x minor bumps."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NX_DAEMON: false

    steps:
      - name: Validate inputs
        if: ${{ inputs.bump-peer-deps && inputs.specifier == '' }}
        run: |
          echo "::error::bump-peer-deps requires an explicit specifier (the new version to rewrite ranges to)."
          exit 1

      - name: Checkout
        # fetch-depth: 0 — nx release scans tags and conventional-commits history
        # since the previous release, so it needs the full git history.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump @composurecdk/* peer-dep ranges
        # Rewrites ^0.X.0 ranges only — sufficient while the project is in 0.x.
        # Once we reach 1.x, peer-dep ranges become ^X.0.0 and this step is no
        # longer needed for minor bumps.
        if: ${{ inputs.bump-peer-deps }}
        run: |
          for f in packages/*/package.json; do
            sed -i 's|"@composurecdk/\([^"]*\)": "\^0\.[0-9]\+\.0"|"@composurecdk/\1": "^${{ inputs.specifier }}"|g' "$f"
          done

      - name: Version packages
        run: |
          npx nx release version ${{ inputs.specifier && format('--specifier={0}', inputs.specifier) || '' }}

      - name: Resolve new version
        id: version
        run: |
          version=$(node -p "require('./packages/core/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "branch=release/v${version}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          npx nx release changelog ${{ steps.version.outputs.version }}

      - name: Create release branch and commit
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "::error::No changes produced by nx release. Nothing to release."
            exit 1
          fi
          git commit -m "chore(release): v${VERSION}"
          git push --force-with-lease origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh pr view "$BRANCH" --json number --jq .number >/dev/null 2>&1; then
            echo "PR already open for $BRANCH — branch was force-updated."
            gh pr view "$BRANCH" --json url --jq .url
            exit 0
          fi

          body=$(cat <<EOF
          Release **v${VERSION}**.

          Generated by \`release-prepare\` workflow run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          ## Merge checklist

          - [ ] CI is green
          - [ ] Changelog reads correctly
          - [ ] Version bumps match expectations

          On merge, the \`release-tag\` workflow will push tag \`v${VERSION}\`, which triggers \`release.yml\` (deploy-test → npm publish).
          EOF
          )

          # Strip the YAML-imposed leading indentation from each line so the PR body
          # renders with no spurious indented-code blocks.
          body=$(printf '%s' "$body" | sed 's/^          //')

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "$body"
