name: Release Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Create and push release tag
    # Cheap workflow-level filter so non-release pushes never spin up a runner.
    # Assumes squash-merge of the release PR — the strict regex parse below is
    # the authoritative validation.
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from commit subject
        id: parse
        env:
          SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          subject=$(printf '%s' "$SUBJECT" | head -n1)
          # SemVer: MAJOR.MINOR.PATCH with optional -prerelease and +build identifiers.
          # GitHub squash-merge appends ` (#NN)` to the commit subject — allow it.
          if [[ "$subject" =~ ^chore\(release\):\ v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)(\ \(#[0-9]+\))?[[:space:]]*$ ]]; then
            version="${BASH_REMATCH[1]}"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "Detected release commit for v${version}"
          else
            echo "::error::Commit subject matched startsWith filter but failed strict regex: $subject"
            exit 1
          fi

      - name: Checkout
        # Authenticate with RELEASE_PR_TOKEN (a PAT) so the tag push below triggers
        # release.yml's `push: tags` workflow. Pushes authenticated with the default
        # GITHUB_TOKEN do not trigger downstream workflows.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          token: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin; nothing to do."
            exit 0
          fi
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          # The GitHub Release itself is created by release.yml, gated behind a
          # successful deploy-test (just before npm publish), so we never
          # advertise a release whose artefacts failed to deploy.
