<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f8f9fa;
        color: #2c2c2c;
        text-align: center;
      }
      .error-page {
        max-width: 480px;
        padding: 40px 24px;
      }
      h1 {
        font-size: 4rem;
        margin-bottom: 8px;
      }
      p {
        font-size: 1.1rem;
        color: #5a5a5a;
        margin-bottom: 24px;
      }
      a {
        display: inline-block;
        padding: 12px 28px;
        background: #0d6efd;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
      }
      a:hover {
        background: #0b5ed7;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <h1>404</h1>
      <p>Sorry, we couldn't find that page.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
